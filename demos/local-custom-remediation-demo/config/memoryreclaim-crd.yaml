apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memoryreclaims.demo.nvsentinel.nvidia.com
spec:
  group: demo.nvsentinel.nvidia.com
  names:
    kind: MemoryReclaim
    listKind: MemoryReclaimList
    plural: memoryreclaims
    singular: memoryreclaim
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["nodeName"]
            properties:
              nodeName:
                type: string
              force:
                type: boolean
                default: false
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Node
      type: string
      jsonPath: .spec.nodeName
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
