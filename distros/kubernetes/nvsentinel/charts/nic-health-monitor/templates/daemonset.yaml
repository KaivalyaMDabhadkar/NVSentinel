apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nic-health-monitor.fullname" . }}
  labels:
    {{- include "nic-health-monitor.labels" . | nindent 4 }}
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 5%
  selector:
    matchLabels:
      {{- include "nic-health-monitor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nic-health-monitor.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nic-health-monitor
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["SYS_ADMIN"]
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default ((.Values.global).image).tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--state-polling-interval"
            - "{{ .Values.statePollingInterval }}"
            - "--metrics-port"
            - "{{ .Values.global.metricsPort }}"
            - "--checks"
            - "{{ join "," .Values.enabledChecks }}"
            - "--metadata-path"
            - "{{ .Values.global.metadataPath }}"
            - "--processing-strategy"
            - "{{ .Values.processingStrategy }}"
            - "--config"
            - "/etc/nic-health-monitor/config.toml"
            - "--state-file"
            - "/var/run/nic_health_monitor/state.json"
            - "--boot-id-path"
            - "/nvsentinel/proc/sys/kernel/random/boot_id"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.global.metricsPort }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.global.metricsPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.global.metricsPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
          volumeMounts:
            - name: var-run-vol
              mountPath: /var/run/
            - name: nic-state-vol
              mountPath: /var/run/nic_health_monitor
            - name: metadata-vol
              mountPath: /var/lib/nvsentinel
              readOnly: true
            - name: config-vol
              mountPath: /etc/nic-health-monitor
              readOnly: true
            - name: sys-vol
              mountPath: /nvsentinel/sys
              readOnly: true
            - name: proc-vol
              mountPath: /nvsentinel/proc
              readOnly: true
      volumes:
        - name: var-run-vol
          hostPath:
            path: /var/run/nvsentinel
            type: DirectoryOrCreate
        - name: nic-state-vol
          hostPath:
            path: /var/run/nic_health_monitor
            type: DirectoryOrCreate
        - name: metadata-vol
          hostPath:
            path: /var/lib/nvsentinel
            type: DirectoryOrCreate
        - name: config-vol
          configMap:
            name: {{ include "nic-health-monitor.fullname" . }}-config
        - name: sys-vol
          hostPath:
            path: /sys
            type: Directory
        - name: proc-vol
          hostPath:
            path: /proc
            type: Directory
      nodeSelector:
        nvsentinel.dgxc.nvidia.com/driver.installed: "true"
        {{- with (.Values.global.nodeSelector | default .Values.nodeSelector) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with (.Values.global.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.global.tolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
