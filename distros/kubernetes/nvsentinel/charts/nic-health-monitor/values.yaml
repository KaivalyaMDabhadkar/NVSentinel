image:
  repository: ghcr.io/nvidia/nvsentinel/nic-health-monitor
  pullPolicy: IfNotPresent
  tag: ""

podAnnotations: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Checks to enable for the NIC health monitor
# Available checks:
#   - InfiniBandStateCheck: Monitors IB port state (UP/DOWN), physical state, device disappearance,
#       card homogeneity anomalies; auto-excludes management NICs via NUMA topology
#   - InfiniBandDegradationCheck: Monitors IB counter thresholds (fatal and non-fatal)
#   - EthernetStateCheck: Monitors Ethernet/RoCE interface state (operstate), device disappearance,
#       card homogeneity anomalies; auto-excludes management NICs via NUMA topology
#   - EthernetDegradationCheck: Monitors Ethernet/RoCE counter thresholds
enabledChecks:
  - InfiniBandStateCheck
  - InfiniBandDegradationCheck
  - EthernetStateCheck
  - EthernetDegradationCheck

# Polling interval for state checks. Counter checks run on their own
# fixed 1s cadence (not configurable here) so delta counters stay
# responsive and velocity windows have fresh data; this is independent
# of statePollingInterval.
statePollingInterval: "1s"

# Regex patterns for NICs to exclude from monitoring (comma-separated)
nicExclusionRegex: "^veth.*,^docker.*,^br-.*,^lo$"

# Override automatic device discovery with an explicit inclusion regex (comma-separated).
# When set, only NIC devices matching these patterns are monitored; the standard
# mlx5_* prefix filter, NUMA exclusion, and NicExclusionRegex are all bypassed.
# Leave empty to use the default auto-discovery mechanism.
nicInclusionRegexOverride: ""

# sysfs paths (for containerized deployments with host mounts)
sysClassNetPath: "/nvsentinel/sys/class/net"
sysClassInfinibandPath: "/nvsentinel/sys/class/infiniband"

# Counter detection configuration
counterDetection:
  enabled: true
  counters:
    #--------------------------------------------------------------------------
    # FATAL COUNTERS (isFatal=true → RecommendedAction=REPLACE_VM)
    #--------------------------------------------------------------------------
    - name: link_downed
      path: counters/link_downed
      enabled: true
      isFatal: true
      thresholdType: delta
      threshold: 0
      description: "Port Training State Machine failed - QP disconnect"

    - name: excessive_buffer_overrun_errors
      path: counters/excessive_buffer_overrun_errors
      enabled: true
      isFatal: true
      thresholdType: delta
      threshold: 0
      description: "HCA internal buffer overflow - lossless contract violated"

    - name: local_link_integrity_errors
      path: counters/local_link_integrity_errors
      enabled: true
      isFatal: true
      thresholdType: delta
      threshold: 0
      description: "Physical errors exceed LocalPhyErrors hardware cap"

    - name: rnr_nak_retry_err
      path: hw_counters/rnr_nak_retry_err
      enabled: true
      isFatal: true
      thresholdType: delta
      threshold: 0
      description: "Receiver Not Ready NAK retry exhausted - connection severed"

    #--------------------------------------------------------------------------
    # NON-FATAL COUNTERS (isFatal=false → RecommendedAction=NONE)
    #--------------------------------------------------------------------------

    # Physical Layer (PHY)
    - name: symbol_error
      path: counters/symbol_error
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 10.0
      velocityUnit: second
      description: "PHY bit errors before FEC - physical layer degradation"

    - name: symbol_error_fatal
      path: counters/symbol_error
      enabled: true
      isFatal: true
      thresholdType: velocity
      threshold: 120.0
      velocityUnit: hour
      description: "Symbol errors exceed IBTA BER threshold (10E-12) - link outside spec"

    - name: link_error_recovery
      path: counters/link_error_recovery
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 5.0
      velocityUnit: minute
      description: "Link retraining events - micro-flapping"

    # Transport Layer
    - name: port_rcv_errors
      path: counters/port_rcv_errors
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 10.0
      velocityUnit: second
      description: "Malformed packets received"

    - name: local_ack_timeout_err
      path: hw_counters/local_ack_timeout_err
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 1.0
      velocityUnit: second
      description: "ACK timeout - potential fabric black hole"

    # Congestion Indicators
    - name: port_xmit_discards
      path: counters/port_xmit_discards
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 100.0
      velocityUnit: second
      description: "TX discards due to congestion"

    # RoCE-specific
    - name: roce_slow_restart
      path: hw_counters/roce_slow_restart
      enabled: true
      isFatal: false
      thresholdType: velocity
      threshold: 10.0
      velocityUnit: second
      description: "Victim flow oscillation"

    # Interface Level
    - name: carrier_changes
      path: statistics/carrier_changes
      enabled: true
      isFatal: false
      thresholdType: delta
      threshold: 2
      description: "Link instability - carrier state changes"

# Scheduling configuration
nodeSelector: {}
affinity: {}
tolerations: []

logLevel: info

# Processing strategy for health events
# valid values: EXECUTE_REMEDIATION, STORE_ONLY
# default: EXECUTE_REMEDIATION
# EXECUTE_REMEDIATION: normal behavior; downstream modules may update cluster state.
# STORE_ONLY: observability-only behavior; event should be persisted/exported but should not modify cluster resources.
processingStrategy: EXECUTE_REMEDIATION
