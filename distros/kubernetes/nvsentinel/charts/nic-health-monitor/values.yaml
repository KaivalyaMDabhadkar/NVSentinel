image:
  repository: ghcr.io/nvidia/nvsentinel/nic-health-monitor
  pullPolicy: IfNotPresent
  tag: ""

podAnnotations: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Checks to enable for the NIC health monitor
# Available checks:
#   - InfiniBandStateCheck: Monitors IB port state (UP/DOWN), physical state, device disappearance,
#       card homogeneity anomalies; auto-excludes management NICs via NUMA topology
#   - EthernetStateCheck: Monitors Ethernet/RoCE interface state (operstate), device disappearance,
#       card homogeneity anomalies; auto-excludes management NICs via NUMA topology
enabledChecks:
  - InfiniBandStateCheck
  - EthernetStateCheck

# Polling intervals for state monitoring
statePollingInterval: "1s"

# Regex patterns for NICs to exclude from monitoring (comma-separated)
nicExclusionRegex: "^veth.*,^docker.*,^br-.*,^lo$"

# Override automatic device discovery with an explicit inclusion regex (comma-separated).
# When set, only NIC devices matching these patterns are monitored; the standard
# mlx5_* prefix filter, NUMA exclusion, and NicExclusionRegex are all bypassed.
# Leave empty to use the default auto-discovery mechanism.
nicInclusionRegexOverride: ""

# sysfs paths (for containerized deployments with host mounts)
sysClassNetPath: "/nvsentinel/sys/class/net"
sysClassInfinibandPath: "/nvsentinel/sys/class/infiniband"

# Scheduling configuration
nodeSelector: {}
affinity: {}
tolerations: []

logLevel: info

# Processing strategy for health events
# valid values: EXECUTE_REMEDIATION, STORE_ONLY
# default: EXECUTE_REMEDIATION
# EXECUTE_REMEDIATION: normal behavior; downstream modules may update cluster state.
# STORE_ONLY: observability-only behavior; event should be persisted/exported but should not modify cluster resources.
processingStrategy: EXECUTE_REMEDIATION
